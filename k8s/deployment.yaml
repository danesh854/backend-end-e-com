apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment   # ✅ MUST match Jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend        # ✅ MUST match Jenkins
        image: daneshkabade45/backend:latest
        ports:
        - containerPort: 3000
